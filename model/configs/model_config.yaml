# model_config.yaml
model:
  vocab_size: 32064
  context_length: 1024
  d_model: 768
  n_heads: 12
  n_layers: 12
  bias: false

training:
  total_batch_size: 524288
  micro_batch_size: 16
  max_steps: 9537          # 9537 × 524288 ≈ 5B tokens
  warmup_steps: 357        # 3.75% of max_steps
  max_lr: 6.0e-4
  min_lr: 6.0e-5
  val_interval: 250
  hella_interval: 250
  ckpt_interval: 2500

paths:
  tokenizer: "artifacts/tokenizer.json"
  shards_dir: "artifacts/shards"
  log_dir: "log"
